<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MY Ai Demo</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
</head>
<body>
<h1>Hello My Ai demo!</h1>
<div id="app">
    <h1>NLP纠错</h1>
    <el-input
            v-model="nlp_input"
            placeholder="请输入内容"
            clearable>
    </el-input>
    <el-input
            v-model="nlp_output"
            :rows="2"
            type="textarea"
            placeholder="识别结果">
    </el-input>
    <el-button type="primary" @click="nlp_correction">纠错</el-button>

    <h1>图像识别</h1>
    <el-upload
            class="upload-demo"
            drag
            action="http://127.0.0.1:8080/img"
            :on-success="imgUploadFile"
            multiple>
        <i class="el-icon-upload"></i>
        <div class="el-upload__text">将文件拖到此处，或<em>点击上传</em></div>
        <div class="el-upload__tip" slot="tip">只能上传jpg/png文件，且不超过500kb</div>
    </el-upload>
    <el-input
            v-model="img_output"
            :rows="2"
            type="textarea"
            placeholder="图像识别的结果">
    </el-input>

    <h1>文字识别</h1>
    <el-upload
            class="upload-demo"
            drag
            action="http://127.0.0.1:8080/word"
            :on-success="wordUploadFile"
            multiple>
        <i class="el-icon-upload"></i>
        <div class="el-upload__text">将文件拖到此处，或<em>点击上传</em></div>
        <div class="el-upload__tip" slot="tip">只能上传jpg/png文件，且不超过500kb</div>
    </el-upload>
    <el-input
            v-model="word_output"
            :rows="2"
            type="textarea"
            placeholder="识别结果">
    </el-input>

</div>

</body>
<script src="https://cdn.bootcss.com/vue/2.5.16/vue.min.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script>
    new Vue({

        el:'#app',
        data:{
            "nlp_input":"",
            "nlp_output":"",
            "img_output":"",
            "word_output":""

        },
        methods:{
            nlp_correction(){
                axios.get("http://127.0.0.1:8080/nlp",{
                    params:{
                        text:this.nlp_input
                    }
                }).then(res=>{
                    this.nlp_out=res.data;
                    console.log(res.data);
                })
            },
            imgUploadFile(res,file){
                console.log("123");
                console.log(res);
                this.img_output=res;
            },
            wordUploadFile(res,file){
                console.log("123");
                console.log(res);
                this.word_output=res;
            }
        }
    })


</script>
</html>
